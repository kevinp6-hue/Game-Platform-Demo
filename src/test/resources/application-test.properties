# Centralized test defaults (integration tests still override datasource via Testcontainers).
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
spring.jpa.hibernate.ddl-auto=none

# HS256 requires >= 256-bit key; override the too-short prod default for tests
security.jwt.secret=test_secret_key_for_integration_tests_must_be_32_chars

