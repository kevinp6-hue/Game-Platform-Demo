spring.application.name=Game-Platform-Demo

# External PostgreSQL (override via environment variables in each deployment)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Validate schema against migrations; do not auto-create tables in prod
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

# Actuator health endpoint
# Expose health at /API/health (replacing the previous custom String endpoint).
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/API
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
