services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: game-platform-demo-api
    env_file:
      - .env
    environment:
      # Keep secrets and environment-specific values in `.env` (ignored by git).
      DB_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
